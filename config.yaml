hotkey:
  modifiers: ["super", "alt"]
  key: "space"

stt:
  engine: "whisper"
  whisper:
    # English-only distil model: near-small accuracy at a lower CPU cost.
    # Other good picks: "small.en" (more accurate, slower), "base.en" (faster).
    model: "distil-small.en"
    device: "auto"
    compute_type: "int8"
    language: "en"
    beam_size: 5
    # Parallel-decode batch size for BatchedInferencePipeline.
    batch_size: 8
    # Optional vocabulary hint to bias spelling of names/jargon, e.g.
    # "Kaeden, numpy, ctranslate2, async, kwargs".
    initial_prompt: ""
  vosk:
    model_name: "vosk-model-small-en-us-0.15"
  # Moonshine: fast English-only ASR (onnxruntime, no torch). Good on weak CPUs.
  moonshine:
    model: "moonshine/base"  # or "moonshine/tiny" (faster, less accurate)

audio:
  sample_rate: 16000
  channels: 1
  chunk_size: 1024
  device: null

injection:
  method: "auto"
  delay_ms: 50

tray:
  enabled: true
  notifications: true

logging:
  level: "INFO"
  file: null
